log_reading:
  name: Log reading
  description: Log a test-strip reading. Any subset of fields.
  fields:
    total_bromine:
      name: Total Bromine (ppm)
      example: 4.2
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          mode: box
    ph:
      name: pH
      example: 7.4
      selector:
        number:
          min: 6
          max: 9
          step: 0.1
          mode: box
    total_alkalinity:
      name: Total Alkalinity (ppm)
      example: 100
      selector:
        number:
          min: 0
          max: 300
          step: 10
          mode: box
    calcium_hardness:
      name: Calcium Hardness (ppm)
      example: 180
      selector:
        number:
          min: 0
          max: 1000
          step: 10
          mode: box

log_dose:
  name: Log dose
  description: Log a chemical dose to the water. Resets retest/cadence timers.
  fields:
    product:
      name: Product
      required: true
      example: brominating_granules
      selector:
        select:
          mode: dropdown
          options:
            - label: "Brominating granules (~60% BCDMH)"
              value: brominating_granules
            - label: "Dry acid (sodium bisulphate)"
              value: dry_acid
            - label: "pH up (sodium carbonate)"
              value: ph_up
            - label: "TA increaser (sodium bicarbonate)"
              value: ta_up
            - label: "Calcium hardness increaser (calcium chloride)"
              value: ch_up
            - label: "Spa No Scale (sequestrant)"
              value: spa_no_scale
            - label: "Non-chlorine shock (MPS)"
              value: mps_shock
            - label: "Defoamer"
              value: defoamer
            - label: "Clarifier"
              value: clarifier
            - label: "Sodium bromide reserve"
              value: sodium_bromide
            - label: "Bromine tablets (BCDMH 20 g floater)"
              value: bromine_tablets
    amount:
      name: Amount (g for solids, ml for liquids)
      required: true
      example: 10
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          mode: box

log_maintenance:
  name: Log maintenance action
  description: Record that a maintenance action (filter cleaned, surface wiped) was completed. Resets the schedule_due timer for the action.
  fields:
    product:
      name: Action
      required: true
      example: filter_cleaner
      selector:
        select:
          mode: dropdown
          options:
            - label: "Filter cartridge cleaner"
              value: filter_cleaner
            - label: "Surface cleaner"
              value: surface_cleaner
